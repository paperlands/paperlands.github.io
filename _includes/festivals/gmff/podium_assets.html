{% comment %}
  _includes/gmff/podium_assets.html
  Drop ONCE into your layout before </body>.
{% endcomment %}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
if (window.tailwind) {
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          orbitron: ['Orbitron','monospace'],
          mono:     ['Share Tech Mono','monospace'],
          rajdhani: ['Rajdhani','sans-serif'],
        },
        keyframes: {
          gridScroll:  { '0%':{ backgroundPosition:'0 0'         }, '100%':{ backgroundPosition:'0 80px'    } },
          scanline:    { '0%':{ transform:'translateY(-100%)'    }, '100%':{ transform:'translateY(100vh)'  } },
          riseUp:      { '0%':{ opacity:'0', transform:'translateY(28px)' }, '100%':{ opacity:'1', transform:'translateY(0)' } },
          shimmer:     { '0%':{ backgroundPosition:'-400px 0'   }, '100%':{ backgroundPosition:'400px 0'   } },
          goldPulse:   { '0%,100%':{ boxShadow:'0 0 8px #f59e0b, 0 0 20px rgba(245,158,11,0.35)' }, '50%':{ boxShadow:'0 0 20px #f59e0b, 0 0 45px rgba(245,158,11,0.45)' } },
          silverPulse: { '0%,100%':{ boxShadow:'0 0 6px #94a3b8, 0 0 16px rgba(148,163,184,0.25)' }, '50%':{ boxShadow:'0 0 14px #94a3b8, 0 0 30px rgba(148,163,184,0.35)' } },
          bronzePulse: { '0%,100%':{ boxShadow:'0 0 6px #b45309, 0 0 16px rgba(180,83,9,0.25)'  }, '50%':{ boxShadow:'0 0 14px #cd7c2a, 0 0 30px rgba(180,83,9,0.35)'  } },
          badgeDrop:   { '0%':{ opacity:'0', transform:'translateX(-50%) translateY(-10px) scale(0.8)' }, '100%':{ opacity:'1', transform:'translateX(-50%) translateY(0) scale(1)' } },
        },
        animation: {
          gridScroll:  'gridScroll 22s linear infinite',
          scanline:    'scanline 7s linear infinite',
          riseUp:      'riseUp 0.65s ease both',
          shimmer:     'shimmer 2s linear infinite',
          goldPulse:   'goldPulse 2.5s ease-in-out infinite',
          silverPulse: 'silverPulse 3s ease-in-out infinite',
          bronzePulse: 'bronzePulse 3s ease-in-out infinite',
          badgeDrop:   'badgeDrop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.5s both',
        }
      }
    }
  }
}
</script>

<style>
/* ── Section wrapper ──────────────────────────────────────── */
.gmff-podium {
  background: #040404; color: #e5e5e5;
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden; position: relative;
}
.gmff-grid-bg {
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(249,115,22,0.09) 1px, transparent 1px),
    linear-gradient(90deg, rgba(249,115,22,0.09) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridScroll 22s linear infinite;
  mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.2) 15%, rgba(0,0,0,0.45) 55%, transparent 100%);
}
.gmff-scanline {
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(249,115,22,0.3), transparent);
  animation: scanline 7s linear infinite; z-index: 2; pointer-events: none;
}

/* ── Watch link panel (replaces video embed) ──────────────── */
.watch-panel {
  display: block; text-decoration: none;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  transition: background 0.2s;
}
.watch-panel:hover { background: rgba(249,115,22,0.06); }
.watch-inner {
  display: flex; align-items: center; gap: 12px;
  padding: 18px 20px; min-height: 84px;
}
.platform-glyph {
  width: 28px; height: 28px; flex-shrink: 0;
  color: rgba(249,115,22,0.55);
  transition: color 0.2s, transform 0.2s;
}
.watch-panel:hover .platform-glyph { color: rgba(249,115,22,0.9); transform: scale(1.1); }
.watch-label {
  font-family: 'Orbitron', monospace; font-size: 10px;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: rgba(249,115,22,0.6); flex: 1;
  transition: color 0.2s;
}
.watch-panel:hover .watch-label { color: rgba(249,115,22,0.95); }
.watch-arrow {
  width: 16px; height: 16px; flex-shrink: 0;
  color: rgba(249,115,22,0.35);
  transition: color 0.2s, transform 0.2s;
}
.watch-panel:hover .watch-arrow { color: rgba(249,115,22,0.8); transform: translateX(3px); }

/* ── Medal badges ─────────────────────────────────────────── */
.medal {
  position: absolute; top: -18px; left: 50%;
  transform: translateX(-50%);
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Orbitron', monospace; font-weight: 900; font-size: 14px;
  z-index: 10; border: 2px solid;
  animation: badgeDrop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.5s both;
}
.medal-1 { background:#1a1000; border-color:#f59e0b; color:#f59e0b; box-shadow:0 0 18px rgba(245,158,11,0.65); }
.medal-2 { background:#0c1018; border-color:#94a3b8; color:#cbd5e1; box-shadow:0 0 12px rgba(148,163,184,0.45); }
.medal-3 { background:#140800; border-color:#b45309; color:#cd7c2a; box-shadow:0 0 12px rgba(180,83,9,0.45); }

/* ── Podium cards ─────────────────────────────────────────── */
.podium-card { position: relative; display: flex; flex-direction: column; transition: transform 0.25s; }
.podium-card:hover { transform: translateY(-4px); }
.card-inner { border: 1px solid; background: rgba(8,5,0,0.94); overflow: hidden; position: relative; flex: 1; }
.card-inner::before,.card-inner::after { content:''; position:absolute; width:13px; height:13px; border-style:solid; z-index:5; pointer-events:none; }
.card-inner::before { top:0; left:0; border-width:2px 0 0 2px; }
.card-inner::after  { bottom:0; right:0; border-width:0 2px 2px 0; }
.rank-1 .card-inner { border-color:rgba(245,158,11,0.65); animation:goldPulse 2.5s ease-in-out infinite; }
.rank-1 .card-inner::before,.rank-1 .card-inner::after { border-color:#f59e0b; }
.rank-2 .card-inner { border-color:rgba(148,163,184,0.45); animation:silverPulse 3s ease-in-out infinite; }
.rank-2 .card-inner::before,.rank-2 .card-inner::after { border-color:#94a3b8; }
.rank-3 .card-inner { border-color:rgba(180,83,9,0.45); animation:bronzePulse 3s ease-in-out infinite; }
.rank-3 .card-inner::before,.rank-3 .card-inner::after { border-color:#b45309; }
.shimmer-overlay {
  position:absolute; inset:0; z-index:3; pointer-events:none;
  background:linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.04) 50%, transparent 60%);
  background-size:400px 100%; opacity:0; transition:opacity 0.3s;
}
.podium-card:hover .shimmer-overlay { opacity:1; animation:shimmer 2s linear infinite; }

/* ── Finalist cards ───────────────────────────────────────── */
.finalist-card {
  border: 1px solid rgba(249,115,22,0.18);
  background: rgba(8,5,0,0.9);
  position: relative; overflow: hidden;
  transition: border-color 0.2s, transform 0.2s;
  display: flex; flex-direction: column;
}
.finalist-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 2px; height: 100%;
  background: linear-gradient(to bottom, transparent, rgba(249,115,22,0.45), transparent);
  opacity: 0.35; transition: opacity 0.2s;
}
.finalist-card:hover { border-color: rgba(249,115,22,0.45); transform: translateY(-2px); }
.finalist-card:hover::before { opacity: 0.9; }

/* Finalist watch panel */
.finalist-watch-panel { display:block; text-decoration:none; border-bottom:1px solid rgba(255,255,255,0.05); transition:background 0.2s; }
.finalist-watch-panel:hover { background:rgba(249,115,22,0.05); }
.finalist-watch-inner { display:flex; align-items:center; gap:10px; padding:12px 14px; min-height:58px; }
.finalist-glyph { width:20px; height:20px; flex-shrink:0; color:rgba(249,115,22,0.45); transition:color 0.2s; }
.finalist-watch-panel:hover .finalist-glyph { color:rgba(249,115,22,0.85); }
.finalist-watch-label {
  font-family:'Share Tech Mono',monospace; font-size:9px;
  letter-spacing:0.12em; text-transform:uppercase;
  color:rgba(249,115,22,0.45); transition:color 0.2s;
}
.finalist-watch-panel:hover .finalist-watch-label { color:rgba(249,115,22,0.85); }

/* ── Shared ───────────────────────────────────────────────── */
.tag-pill {
  display:inline-flex; align-items:center; padding:2px 8px;
  border:1px solid rgba(249,115,22,0.3);
  font-family:'Share Tech Mono',monospace; font-size:10px;
  color:rgba(249,115,22,0.65); letter-spacing:0.08em;
}
.orange-line { height:1px; background:linear-gradient(90deg,transparent,rgba(249,115,22,0.55),transparent); }
.glow        { text-shadow:0 0 18px rgba(249,115,22,0.8), 0 0 36px rgba(249,115,22,0.4); }
.glow-gold   { text-shadow:0 0 14px rgba(245,158,11,0.85), 0 0 28px rgba(245,158,11,0.45); }
.glow-silver { text-shadow:0 0 10px rgba(148,163,184,0.75), 0 0 22px rgba(148,163,184,0.35); }
.glow-bronze { text-shadow:0 0 10px rgba(180,83,9,0.75), 0 0 22px rgba(180,83,9,0.35); }
.math-dec {
  font-family:'Share Tech Mono',monospace; font-size:11px;
  color:rgba(249,115,22,0.18); letter-spacing:0.05em;
  text-align:center; overflow:hidden; white-space:nowrap;
}
</style>

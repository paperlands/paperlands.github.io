# Canonical lesson catalog — the single source of truth for lesson identity.
# Pages compose per-page programmes (selection, order, dates, overrides) in
# their own front matter; see _pages/tjc.md and _pages/lesson-plans.md.
#
# Fields: title, description, lesson_url, thumb,
#         world (1-5, twilight canvas renderer id in assets/js/twilight-sky.js, optional)
#
# lesson_url points to a local redirect page (e.g. /gemstone) rather than
# directly to Notion, so all outbound clicks go through _layouts/redirect.html
# for analytics. The Notion target lives in that redirect page's front matter.
#
# Programme entries may override title/description/lesson_url per page.
# Note: overrides resolve via Liquid `default:`, so an empty-string override
# falls back to the catalog value.

regular_gemstone:
  title: "Polygons to Gemstones"
  description: "Learn basic movement commands and loops to create geometric patterns."
  lesson_url: /gemstone
  thumb: /assets/lib/lesson-plans/regular_gemstone.webp
  world: 1

circular_arc:
  title: "Arcs and Abstractions"
